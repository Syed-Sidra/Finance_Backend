# H2 In-Memory for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate create schema in tests (Flyway disabled)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Disable Flyway for tests — Hibernate manages schema
spring.flyway.enabled=false

# JWT test values
app.jwt.secret=test-secret-key-minimum-32-characters-long-for-tests
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-ms=604800000

# Suppress logs during tests
logging.level.com.finance=WARN
logging.level.org.springframework.security=WARN
