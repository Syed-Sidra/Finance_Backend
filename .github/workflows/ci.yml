name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Job 1: Build & Test ────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: finance_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -ptestpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and run unit tests
        run: mvn clean test -q
        env:
          # Tests use H2 in-memory — no MySQL needed for unit tests
          JWT_SECRET: test-secret-key-for-ci-pipeline-only-not-production
          JWT_ACCESS_EXPIRY_MS: 900000
          JWT_REFRESH_EXPIRY_MS: 604800000

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/

      - name: Package application
        run: mvn package -DskipTests -q

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: finance-backend-jar
          path: target/*.jar
          retention-days: 7

  # ── Job 2: Docker Build (runs after tests pass, only on main) ──────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false   # Set to true and add docker/login-action to push to a registry
          tags: finance-backend:${{ github.sha }},finance-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image built successfully
        run: echo "Docker image finance-backend:${{ github.sha }} built successfully"
